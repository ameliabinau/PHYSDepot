        <h2>Resources, Software, & Tools</h2>
<div class="card-container">
  
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Wolfram Alpha</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection
                    </p>
                    <p>Wolfram Alpha is an online calculator that is capable of easily converting between units, numerical calculations using fundamental constants, and doing calculations that are more advanced than other online calculators, such as solving systems of equations, matrix manipulation, and solving differential equations.</p>
                    <p class="resource-contributor">Contributor: Ricky Dube, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button"
                        href="https://www.wolframalpha.com/" target="_blank">Click here
                        to access this resource</a> 
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Ansys Multiphysics Analysis</h2>
                <div class="collapsible-card-info">
                    <p>Ansys is a company which provides analytical tools for modeling physical phenomena in mechanical systems. They provide products for analyzing fulid mechanics (Ansys Fluent), 3D design (Ansys Discover), structural mechanics (Ansys Mechanical), thermal load in electronics (Ansys Icepak), electromagnetic fields (Ansys HFSS), optics (Ansys Zemax OpticStudio), and more. There are also simulation options to assist in product design. 
                    </p>
                    <p class="resource-contributor">Contributor: Amelia Binau on behalf of Brenna McConnell, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.ansys.com/" target="_blank">Click
                        here to access this resource</a>
                </div>
            </button>

</div>

        <h2>Packages</h2>

<div class="card-container">
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Chebfun MATLAB</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): MATLAB. Usage Requirements: MATLAB environment.
                    </p>
                    <p>Chebfun is a MATLAB package created in 2002 that allows the user to work with and visualize a plethora of advanced mathematical functions. It serves as the primary tool for examples in the textbook <a href="https://www.chebfun.org/ATAP/">Approximation Theory and Approximation Practice</a>, of which example codes and the first 6 chapters are available online. Work with linear and nonlinear ODEs, integration methods, Chebyshev expansions, complex analysis, Fourier analysis, PDEs, multivariate approximation methods, and more. Chebfun is well-documented, featuring a <a href="https://www.chebfun.org/docs/guide/">guide</a> which includes its extensions <a href="https://www.chebfun.org/docs/guide/guide16.html">Diskfun</a> and <a href="https://www.chebfun.org/docs/guide/guide17.html">Spherefun</a>. Must be awfully fun!</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button"
                        href="https://i2u2-minerva.crc.nd.edu/arachnesimplelaunchpage.html" target="_blank">Click here
                        to access this resource</a> 
                </div>
            </button>

        </div>

        <h2>Datasets</h2>
<div class="card-container">
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">BLASTNet: Bearable Large Accessible Scientific Training Network-of-Datasets</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): Variable. Usage Requirements: Familiarity with Kaggle (tutorials available).
                    </p>
                    <p>Need data for ML analysis of fluid dynamics? BLASTNet is a project designed to compile open-source datasets on hydrodynamic systems for training machine learning algorithms. BLASTNet's website contains tutorials for accessing data through Kaggle (where most of its content is stored) and training ML's. Study homogeneous isotropic turbulence, shocks, channeled flow, jet fuel flows, and even propagation of wildfires. Added plus, most datasets are well-introduced with a summary of theoretical background in BLASTNet's catalog.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button"
                        href="https://blastnet.github.io/" target="_blank">Click here
                        to access this resource</a> 
                </div>
            </button>
