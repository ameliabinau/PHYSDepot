        <h1>Quantum Information 💻</h1>

        <img src="https://physdepot.org/graphics/Quantum_Banner.jpeg" width = 100%/>

        <h2>Resources & Tools</h2>

        <div class="card-container">
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">IBM Quantum Platform</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): None. Usage Requirements: Web-based; only
                        internet connection and free sign-in (IBMid) required.</p>
                    <p>The IBM Quantum Platform offers some of the best resources for beginner and more advanced quantum computing I've ever seen. Accessable upon creation of an IBMid, this web-based resource allows users to send quantum programs straight to IBM's quantum processors. They also offer a variety of learning resources, including the Quantum Composer, a beautiful, clean interactive where individuals can toy around with quantum circuitry and immediately generate the corresponding code in Qiskit or OpenQASM 2.0. The platform offers courses in the fundementals of quantum computing <a href="https://learning.quantum.ibm.com/">(IBM Quantum Learning)</a>. If you're an individual interested in experimenting with quantum computing/programming, the IBM Quantum Platform is a must-have. The only drawback is the user is only allotted 10 minutes of runtime on IBM's GPU's per month, which depending on the complexity of your quantum algorithums, may be a lot or too little.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://quantum.ibm.com/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Quantum Algorithm Zoo</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): Packages for best implementation of each quantum algorithm listed, most Python-based. Usage Requirements: Internet connection, Python IDE or other quantum computation tools needed for execution of algorithms</p>
                    <p>It's in the name! Created by Stephen P. Jordan at Google Quantum AI, this site hosts a remarkable catalog of quantum algorithm descriptions and packages for quality implementation. Use it to compare algorithm design and runtime, and explore further using the associated <a href="https://quantumgraph.info/">Quantum Map</a>, a visual network of relationships between algorithms. </p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://quantumalgorithmzoo.org/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Open Quantum Safe & liboqs</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): C. Usage Requirements: Internet connection, C compiler, GitHub for liboqs</p>
                    <p>Designed to promote the free use of quantum computer-resistant cryptography algorithms and prepare open cryptography techniques for the post-quantum computing age. Open Quantum Safe hosts liboqs, a library of C-based quantum cryptography algorithms on their <a href="https://github.com/open-quantum-safe/liboqs">GitHub</a>.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://quantumalgorithmzoo.org/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>
        </div>

        <h2>Packages</h2>

        <div class="card-container">
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">IBM Qiskit</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): Python. Usage Requirements: Python-compatible IDE</p>
                    <p>Qiskit is the most popular go-to package for quantum computing and simulating/executing quantum algorithums. Providing a suite of add-ons and tools, Qiskit allows for the construction, simulation, and execution of quantum circuitry on IBM quantum or classical computers. Plenty of documentation and example code is available online and functions for specific problem-solving application and optimization. </p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.ibm.com/quantum/qiskit" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">PennyLane</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): Python. Usage Requirements: Python-compatible IDE, optional hardware or alternate back-end simulations</p>
                    <p>Integrate machine learning, simulation, quantum circuitry, and hardware using PennyLane's multifaceted array of capabilities designed to interface between quantum techniques. It is built to support research in QC, ML, and quantum chemistry. The platform provides ample documentation for all its functionalities, including <a href="https://pennylane.ai/qml">tutorials</a> for getting started with quantum computing and ML.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://pennylane.ai/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>
        </div>

        <h2>Datasets</h2>
        <div class="card-container">
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">QDataSet</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirement(s): Python, Jupyter. Usage Requirements: Python, Jupyter-compatible IDE</p>
                    <p>Set of 52 open data sets for us of training and evaluating quantum computing and QC machine learning models, complete with example notebooks. More information in the associated manuscript <a href="https://arxiv.org/pdf/2108.06661">manuscript</a>.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://github.com/eperrier/QDataSet" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

        </div>
