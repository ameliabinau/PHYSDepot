        <h1> Physics Education Tools & Research 📖</h1>

        <h2>Resources & Tools</h2>

        <div class="card-container">
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Slooh</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Fairly strong internet connection, paid
                        subscription.</p>
                    <p>Slooh is a powerful online platform that allows educators and amateur astronomers remotely access
                        telescopes in Chile, the Canary Islands, and Australia. Simply select a target & telescope,
                        queue a scheduling block, adjust preferences, and watch as your research-grade image is
                        captured. It is a brilliant, interactive way to explore the cosmos. Slooh hosts a variety of
                        educational events and more advanced research options (have your data exported as FITS files for
                        more detailed examination) and a constant stream of observations is available to watch in
                        real-time. While the service comes with a price, I helped use this platform for <a href="https:
                            //www.physics.purdue.edu/outreach/">Purdue University's physics and astronomy outreach
                            program</a> and I can personally attest it is worth the investment if you're strongly
                            interested in amateur astronomy but are overwhelmed with the mechanics/cost of a full
                            personal telescope.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University</p>
                    <a class="collapsible-content-button" href="https://www.slooh.com/amateurs" target="_blank">Click
                        here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">W3Schools: Coding & Web Development</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>W3Schools is a useful website to learn a huge variety of programming languages, ranging from
                        Java, C, C++, html, css, SQL, Python and some of its commonly used libraries, and more.</p>
                    <p class="resource-contributor">Akshith Karri, Purdue University</p>
                    <a class="collapsible-content-button" href="https://www.w3schools.com/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Zooniverse Citizen Science</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>A classic, well-known platform hosting maintained projects in a variety of fields (often astrophysics and ecology) that require community participation to classify, organize, and analyze data. Each project features a game-like user interface that walks each participant through the scientific details of the project and how the user contributes/analyzes data. For example, in the ongoing <a href="https://www.zooniverse.org/projects/orionnau/rubin-comet-catchers">Rubin Comet Catchers</a> project, citizen scientists can review Vera Rubin Observatory images of small solar system objects to search for signs of comet activity! Zooniverse is a fun way to introduce the mechanisms of scientific research to new audiences and participate hands-on with publishable science!</p>
                    <p class="resource-contributor">Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.zooniverse.org/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">DoITPoMS Material Science IT</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>Created by researchers at Cambridge, DoITPoMS hosts a library of materials in fundemental-advanced material sciences. Browse learning/teaching resources, simulations, and a collection of micrographs.</p>
                    <p class="resource-contributor">Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.doitpoms.ac.uk/index.php" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Falstad Circuit Simulator</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>A simple, online interface for simulating simple circuits. Loads with a sample LCR circuit and displays plots of the voltage and current applied to each component as a function of time. Provides a sizable <a href="https://www.falstad.com/circuit/e-index.html">index of sample circuits</a> to browse and learn from.</p>
                    <p class="resource-contributor">Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.falstad.com/circuit/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Falstad Simulation Applets</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>Explore a glorious, complete collection of physics simulations for use in the classroom, self-studying, or even in the laboratory. Interactive simulations for topics ranging from electrodynamics, Fourier series, waveguides, acoustics, simple quantum models, wave dynamics, orbital dynamics, optics, semiconductors, molecular dynamics, and more.</p>
                    <p class="resource-contributor">Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.falstad.com/mathphysics.html" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>
        </div>
