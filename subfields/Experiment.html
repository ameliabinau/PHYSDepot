        <h1>Experimental & Statistical Techniques 🔍</h1>

        <img src="https://physdepot.org/graphics/Exp_Banner.jpeg" width = 100%/>


        <h2>Resources, Tools, & Software</h2>

        <div class="card-container">
 
             <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">LabVIEW</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Windows, Mac, Linux, or Docker OS</p>
                    <p>LabVIEW by National Instruments (NI) is by far one of the most widely used software in labs around the world for connecting, automating, and controlling hardware and collection of data using a unique "circuit board"-like graphical programming language. Visually design logic gates, controls, and data acquisition/display panels that can either be used for analysis locally or with configuration of external hardware. It's a crucial, complex tool that is also fun to play around with and create simple projects. While the professional version is only available for purchase, a community version is offered for free, and if you're not working with advanced instruments or algorithums, it should cover just about everything you need.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.ni.com/en/shop/labview.html" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>
 
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">KiCad: PCB & Schematic Electronic Design</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Windows, Mac, Linux, or Docker OS</p>
                    <p>Possibly one of the most commonly used software for designing printed circuit boards (PCBs) for
                        electronics. Design a PCB board as a .kicad_pcb file and an associated schematic (quite
                        literally a circuit diagram) as a .kicad_sch file, export as a Gerber file, and have your
                        circuit printed by a reliable company such asPCBWay. When laboratories need a circuit to
                        accomplish a specific digital or mechanical task, it's common to have scientists design their
                        own on software such as KiCad. A similar software produced by Autodesk is EAGLE.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.kicad.org/" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>
            
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Colorbrewer 2.0</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection and Browser</p>
                    <p>Designed to help researchers color-code maps and cartography, ColorBrewer 2.0 assists the user in selecting color schemes appropriate for data visualization. Use this tool to improve choices for colorblind accessibility, determine appropriate contrast, or just test how a set of colors may look when illustrating attributes of your data.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau on behalf of Prof. Mark Messier, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://colorbrewer2.org/#type=sequential&scheme=BuGn&n=3" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">RP Photonics - Encyclopedia</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet connection and internet browser</p>
                    <p>Convenient location for many relevant and contemporary fields/topics in the optics space including geometric optics, lasers, electromagnetism, material optical properties, signal processing. Has very concise and well-written articles that simplify concepts and explanations and provide citations to begin a deeper dive if you so choose. you can just search any relevant topic and add RP photonics to the end of your search query to find their article or you can just navigate on their website. Topics and subtopics are broken up in categories.</p>
                    <p class="resource-contributor">Contributor: Gabriel Skowronek - University of Central Florida (UCF)</p>
                    <a class="collapsible-content-button" href="https://www.rp-photonics.com/encyclopedia.html" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>
            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">NotebookLM: AI-Powered Research and Writing Assistant</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>NotebookLM is an AI Research tool developed by Google which can summarize, make connections, and
                        answer questions from uploaded PDFs, websites, YouTube videos, audio files, Google Docs, and
                        Google Slides.</p>
                    <p class="resource-contributor">Robert C. Laughlin, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button"
                        href="https://notebooklm.google.com/?original_referer=https:%2F%2Fwww.google.com%23&pli=1"
                        target="_blank">Click here to access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">SciSpace: AI-Powered Research Search Tool</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>SciSpace is an AI specifically for locating relevant articles for research topics. Use SciSpace
                        to help speed up the process of finding relevant articles, it's like a more direct Google
                        Scholar. SciSpace really helps with finding papers to read if you're getting into a field or
                        doing a literature review.</p>
                    <p class="resource-contributor">Jonathan Sullivan-Wood</p>
                    <a class="collapsible-content-button" href="https://scispace.com/" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Falstad Circuit Simulator</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Usage Requirements: Internet Connection</p>
                    <p>A simple, online interface for simulating simple circuits. Loads with a sample LCR circuit and displays plots of the voltage and current applied to each component as a function of time. Provides a sizable <a href="https://www.falstad.com/circuit/e-index.html">index of sample circuits</a> to browse and learn from.</p>
                    <p class="resource-contributor">Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.falstad.com/circuit/" target="_blank">Click here
                        to access this resource</a>
                </div>
            </button>
        </div>

        <h2>Packages</h2>

    <div class="card-container">

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">Scikit-Learn: Machine Learning Statistics and Tools</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirements: Python. Usage Requirements: Python-Compatable IDE</p>
                    <p>Scikit-Learn is an open-source package that offers an expansive library of statistical functions necessary for most machine learning applications. A former <a href="https://summerofcode.withgoogle.com/">Google Summer of Code project</a>, Scikit offers tools for just about any machine learning or optimization problem. Regressions, decision trees, classification models, Naive Bayes methods, model evaluation, just about any supervised or unsupervised model functionality is availble. It even has visualization support.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://scikit-learn.org/stable/index.html" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">uv: An Extremely Fast Python Package</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirements: Python, Terminal. Usage Requirements: Python-Compatable IDE</p>
                    <p>Very useful and fast Python package manager that makes Python version and dependency management really simple. Packages and their versions are listed and updated easily in a pyproject.toml file, where additional project settings/configs can also be managed.</p>
                    <p class="resource-contributor">Contributor: Johnathan Gutierrez, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://github.com/astral-sh/uv" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">PlasmaPy Plasma Physics</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Language Requirements: Python. Usage Requirements: Python-Compatable IDE</p>
                    <p>Designed to be an all-encompassing package specifically for plasma physics, PlasmaPy can be of use to astrophysicists, nuclear physcists, high energy physicists, and beyond. Complete with tutorials and example notebooks displaying the package's functionalities. Create simulated charged particle radiographs, visualize E- & B-fields, swept Langmuir trace analysis, properties of two-fluid dispersion relations, power spectra of Thomson scattering & thermal bremsstrahlung, and more. It also provides a vast library submodule of atomic/ionic information for describing the constituents of your chosen plasma.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.plasmapy.org/" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>
    </div>

        <h2>Hardware Retailers</h2>
 <div class="card-container">

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">McMaster-Carr</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Supplies vendor; paid merchandise.</p>
                    <p>The go-to for many labs' hardware needs. Whether it's a bolt of highly specific specificiations or a more general machine shop tool, just about anything needed for designing a physical experiment of any proportion can be found here. McMaster-Carr is reliable and you can browse product specifications in great detail.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.mcmaster.com/" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">DigiKey</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Supplies vendor; paid merchandise.</p>
                    <p>My favorite supplier of electronic components, from heavy-duty hardware to breadboard components to microelectronics, you can get however many of whatever you need of any tolerance, size, shape, voltage, wattage, capacitance, durability, or material. All of the most random, niche electronic parts you could think of, it's quite fun to browse and the company is quite reliable. Great for identifying electrical equipment without much prior knowledge, too, perhaps just a description or ID number.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.digikey.com/" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>

            <button class="collapsible-card collapsed">
                <h2 class="collapsible-card-title">PCBWay</h2>
                <div class="collapsible-card-info">
                    <p class="resource-requirements">Supplies vendor; paid merchandise.</p>
                    <p>All of the PCBs (printed circuit boards) I've made for lab use I've had printed by PCBWay and they've always been great quality for a reasonable price. Draft up any board you can dream of in a Gerber file and they'll print it for you. Custom, pre-assembled boards are available, as well.</p>
                    <p class="resource-contributor">Contributor: Amelia Binau, Indiana University - Bloomington</p>
                    <a class="collapsible-content-button" href="https://www.pcbway.com/" target="_blank">Click here to
                        access this resource</a>
                </div>
            </button>
</div>
